<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My First 3D Browser Game (Babylon.js)</title>
    <style>
        html, body {
            overflow: hidden;
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
            background-color: #111;
            font-family: sans-serif;
        }
        #renderCanvas {
            width: 100%;
            height: 100%;
            touch-action: none;
        }
        #instructions {
            position: absolute;
            top: 10px;
            left: 10px;
            color: white;
            background: rgba(0, 0, 0, 0.7);
            padding: 10px;
            border-radius: 5px;
            pointer-events: none;
        }
        #crosshair {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 6px;  
            height: 6px;        
            background-color: white; 
            border-radius: 50%;    
            transform: translate(-50%, -50%); 
            pointer-events: none;  
            box-shadow: 0 0 2px black;
            opacity: 0.8;
        }
    </style>
    <script src="https://cdn.babylonjs.com/babylon.js"></script>
    <script src="https://cdn.babylonjs.com/loaders/babylonjs.loaders.min.js"></script>
</head>
<body>

    <div id="instructions">
        <h3>Babylon.js Controls</h3>
        <p>Use <b>W, A, S, D</b> to move the blue player box.</p>
    </div>

    <div id="crosshair"></div>

    <canvas id="renderCanvas"></canvas>

    <script>
        const canvas = document.getElementById("renderCanvas");
        const engine = new BABYLON.Engine(canvas, true);

        const createScene = function () {
            const scene = new BABYLON.Scene(engine);
            scene.clearColor = new BABYLON.Color3(0.13, 0.13, 0.13);

            const camera = new BABYLON.UniversalCamera("gameCamera", new BABYLON.Vector3(0, 0.8, 0), scene);
            camera.minZ = 0.01;
            camera.attachControl(canvas, true);
            camera.inertia = 0.1;
            camera.angularSensibility = 500;

            camera.keysUp = [];
            camera.keysDown = [];
            camera.keysLeft = [];
            camera.keysRight = [];
            
            const light = new BABYLON.HemisphericLight("light", new BABYLON.Vector3(0, 1, 0), scene);
            light.intensity = 1;

            BABYLON.SceneLoader.ImportMeshAsync("", "./", "environment.glb", scene).then((result) => {
            const environmentRoot = result.meshes[0];
            environmentRoot.position = new BABYLON.Vector3(0, 0, 0);
            environmentRoot.rotation = new BABYLON.Vector3(0, 0, 0);
            environmentRoot.scaling = new BABYLON.Vector3(100, 100, 100);

            const player = BABYLON.MeshBuilder.CreateBox("player", {size: 1}, scene);
            player.position.y = 0.5;

            const playerMaterial = new BABYLON.StandardMaterial("playerMat", scene);
            playerMaterial.diffuseColor = new BABYLON.Color3(0, 0.5, 1);
            player.material = playerMaterial;

            const inputMap = {};
            
            scene.actionManager = new BABYLON.ActionManager(scene);
            
            scene.actionManager.registerAction(new BABYLON.ExecuteCodeAction(BABYLON.ActionManager.OnKeyDownTrigger, function (evt) {
                inputMap[evt.sourceEvent.key.toLowerCase()] = true;
            }));
            
            scene.actionManager.registerAction(new BABYLON.ExecuteCodeAction(BABYLON.ActionManager.OnKeyUpTrigger, function (evt) {
                inputMap[evt.sourceEvent.key.toLowerCase()] = false;
            }));

            canvas.addEventListener("click", () => {
                canvas.requestPointerLock = canvas.requestPointerLock || canvas.mozRequestPointerLock || canvas.webkitRequestPointerLock;
                if (canvas.requestPointerLock) {
                    canvas.requestPointerLock();
                }
            });

            const playerSpeed = 0.15;
            const gravity = -0.01;      
            const jumpForce = 0.22;     
            let verticalVelocity = 0;   
            let isGrounded = true;      

            scene.onBeforeRenderObservable.add(() => {
                const forward = camera.getDirection(BABYLON.Vector3.Forward());
                const right = camera.getDirection(BABYLON.Vector3.Right());

                forward.y = 0;
                right.y = 0;
                forward.normalize();
                right.normalize();

                let moveDirection = new BABYLON.Vector3(0, 0, 0);
                if (inputMap["w"]) moveDirection.addInPlace(forward);
                if (inputMap["s"]) moveDirection.subtractInPlace(forward);
                if (inputMap["a"]) moveDirection.subtractInPlace(right);
                if (inputMap["d"]) moveDirection.addInPlace(right);

                if (moveDirection.length() > 0) {
                    moveDirection.normalize();  
                    player.position.addInPlace(moveDirection.scale(playerSpeed));
                }

                if (inputMap[" "] && isGrounded) {
                    verticalVelocity = jumpForce; 
                    isGrounded = false;           
                }
                if (!isGrounded) {
                    verticalVelocity += gravity;  
                    player.position.y += verticalVelocity; 
                }
                if (player.position.y <= 0.5) {
                    player.position.y = 0.5;      
                    verticalVelocity = 0;         
                    isGrounded = true;            
                }
              
                player.position.x = Math.max(-19.5, Math.min(19.5, player.position.x));
                player.position.z = Math.max(-19.5, Math.min(19.5, player.position.z));

                camera.position.x = player.position.x;
                camera.position.y = player.position.y + 0.3;
                camera.position.z = player.position.z; 

            });

            return scene;
        });

        const scene = createScene();

        engine.runRenderLoop(function () {
            scene.render();
        });

        window.addEventListener("resize", function () {
            engine.resize();
        });
    </script>
</body>
</html>
